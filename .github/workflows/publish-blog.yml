name: Publish Blog Post

on:
  issues:
    types: [labeled]

jobs:
  publish:
    if: github.event.label.name == 'blog-post' && github.event.issue.user.login == github.repository_owner
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: content/blog-writings
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse issue and create blog file
        id: create_post
        uses: actions/github-script@v7
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        with:
          script: |
            const fs = require('fs');
            const body = process.env.ISSUE_BODY;

            function parseSection(text, section) {
              const esc = section.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              const re = new RegExp(`### ${esc}\\n\\n([\\s\\S]*?)(?=\\n### |$)`);
              const m = text.match(re);
              return m ? m[1].trim() : '';
            }

            const title       = parseSection(body, 'Title');
            const description = parseSection(body, 'Description');
            const tagsRaw     = parseSection(body, 'Tags');
            const draftRaw    = parseSection(body, 'Publish as draft?');
            const content     = parseSection(body, 'Content');

            if (!title || !content) {
              core.setFailed('Title and Content are required. Check the issue body format.');
              return;
            }

            const slug = title.toLowerCase()
              .replace(/[^a-z0-9\s-]/g, '')
              .trim()
              .replace(/\s+/g, '-');

            const filePath = `src/content/blog/${slug}.md`;
            if (fs.existsSync(filePath)) {
              core.setFailed(`File already exists: ${filePath} — rename the post title to avoid collision.`);
              return;
            }

            let tagsLine = 'tags: []';
            if (tagsRaw && tagsRaw !== '_No response_') {
              const tags = tagsRaw.split(',').map(t => `"${t.trim()}"`).join(', ');
              tagsLine = `tags: [${tags}]`;
            }

            const draft = draftRaw === 'true' ? 'true' : 'false';
            const today = new Date().toISOString().split('T')[0];
            const titleEsc = title.replace(/"/g, '\\"');
            const descEsc  = description.replace(/"/g, '\\"');

            const fileContent = [
              '---',
              `title: "${titleEsc}"`,
              `description: "${descEsc}"`,
              `pubDate: ${today}`,
              tagsLine,
              `draft: ${draft}`,
              '---',
              '',
              content,
              '',
            ].join('\n');

            fs.writeFileSync(filePath, fileContent);

            core.setOutput('filename', filePath);
            core.setOutput('slug', slug);
            core.setOutput('title', title);

      - name: Commit and push
        env:
          POST_TITLE: ${{ steps.create_post.outputs.title }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/blog/
          git commit -m "content(blog): add \"${POST_TITLE}\""
          git push origin content/blog-writings

      - name: Comment and close issue
        uses: actions/github-script@v7
        with:
          script: |
            const filename = '${{ steps.create_post.outputs.filename }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Committed to \`content/blog-writings\` as \`${filename}\`.\n\nMerge the branch into \`main\` to publish it live.`,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
            });
